---
- name: Install and configure Nginx on AWS and Azure
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Ensure Nginx is running and enabled
      service:
        name: nginx
        state: started
        enabled: yes

- name: Deploy AWS index.html
  hosts: aws
  become: yes
  tasks:
    - name: Copy AWS index.html
      copy:
        src: ~/ansible/index-aws.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

- name: Deploy Azure index.html
  hosts: azure
  become: yes
  tasks:
    - name: Copy Azure index.html
      copy:
        src: ~/ansible/index-azure.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'

